services:
  adguard:
    image: adguard/adguardhome:v0.107.68@sha256:09a24f05e110e53e213a340b22e5d3c8cdab12ff9be6775388c71b140255c54c
    container_name: adguard
    restart: unless-stopped
    volumes:
      - "{{ data_directory }}/adguard/work:/opt/adguardhome/work"
      - "{{ data_directory }}/adguard/conf:/opt/adguardhome/conf"
    network_mode: host
